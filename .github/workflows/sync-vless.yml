name: Sync VLESS every 3 hours

on:
  schedule:
    # Runs every 3 hours at minute 0
    - cron: '0 */3 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
        
      - name: Download latest VLESS file
        run: |
          curl -fsS https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/main/splitted-by-protocol/vless.txt -o VLESS_temp.txt
          if [ ! -s VLESS_temp.txt ]; then
            echo "✗ Download failed or file is empty"
            exit 1
          fi
          
      - name: Transform tags and update file
        run: |
          # Replace both URL-encoded and plain t.me patterns, allowing an optional leading '#'
          sed -E 's|#?https:%2F%2Ft\.me%2FForceRunVPN|#@SINGBOXXX|g; s|#?https?://t\.me/ForceRunVPN|#@SINGBOXXX|g' VLESS_temp.txt > VLESS.txt
          
          # Extra cleanup: collapse repeated hashes before the tag (##@...  -> #@...)
          sed -E -i 's|##+@SINGBOXXX|#@SINGBOXXX|g; s|##+%40SINGBOXXX|#@SINGBOXXX|g' VLESS.txt
          rm VLESS_temp.txt
          
      - name: Verify file was updated
        run: |
          if [ -f VLESS.txt ]; then
            echo "✓ File updated successfully"
            echo "Total lines: $(wc -l < VLESS.txt)"
            echo "Occurrences of #@SINGBOXXX: $(grep -c '#@SINGBOXXX' VLESS.txt || echo 0)"
            echo "Double-hash occurrences (should be 0): $(grep -c '##@SINGBOXXX' VLESS.txt || echo 0)"
          else
            echo "✗ File update failed"
            exit 1
          fi
          
      - name: Commit and push changes
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VLESS.txt
          
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          
          git commit -m "fix(workflow): avoid duplicate hashes and improve download/push safety ($(date +'%Y-%m-%d %H:%M:%S UTC'))"
          # Push to the current branch (safe for scheduled/workflow_dispatch runs)
          branch="${GITHUB_REF#refs/heads/}"
          git push origin "HEAD:${branch}"
